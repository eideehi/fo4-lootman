name: Bug report
description: Report a bug or broken behavior
title: ""
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

        A helpful report usually includes what you expected, what you did, and what happened instead.
        If you can reproduce the issue reliably, detailed steps can help with investigation.
        Logs, screenshots, videos, and config files are optional, but they are especially helpful for crashes or unclear behavior.
        Reports without enough detail may need follow-up before they can be investigated.

  - type: checkboxes
    id: searched-existing-issue
    attributes:
      label: Existing issues
      description: Please search the existing issues before submitting a new bug report.
      options:
        - label: I have searched the existing issues for a matching bug.
          required: true

  - type: dropdown
    id: version
    attributes:
      label: Mod version
      options:
        - 3.0.0
        - older version
        - development build / unknown
    validations:
      required: true

  - type: textarea
    id: bug-detail
    attributes:
      label: What did you expect, what did you do, and what happened?
      description: At minimum, tell us what you expected, what you did, and what happened instead.
      placeholder: |
        Expected: I expected items matching my filters to be looted.
        Did: I enabled LootMan, set the filter, and stood near the container.
        Happened: The matching items stayed in the container.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Detailed reproduction steps
      description: Optional. If you can reproduce the bug reliably, list the exact steps.
      placeholder: |
        1. Install LootMan 3.0.0.
        2. Open MCM and enable LootMan.
        3. Set the relevant filter.
        4. Stand near the affected object or container.
        5. The issue happens.

  - type: textarea
    id: other-mods
    attributes:
      label: Other mods involved
      description: Optional. If another mod may be involved, list the relevant mods and versions.
      placeholder: |
        Awesome Config Manager v1.2.3
        Awesome NPC Core v4.5.6

  - type: textarea
    id: file-attachments
    attributes:
      label: Logs, screenshots, videos, config files, etc.
      description: Optional. Drag and drop any files that help explain the issue.

  - type: markdown
    attributes:
      value: Thank you for the report.
